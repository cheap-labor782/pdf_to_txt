<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 轉 TXT 批量工具</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', '微軟正黑體', sans-serif;
            background: linear-gradient(145deg, #f5f7fa 0%, #e9edf2 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 35px 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        h1 {
            font-size: 30px;
            font-weight: 700;
            color: #1a2634;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 6px;
            flex-wrap: wrap;
        }
        h1 small {
            font-size: 16px;
            font-weight: 400;
            color: #4b5b6b;
            margin-left: auto;
        }
        .subtitle {
            color: #4b5b6b;
            font-size: 15px;
            border-left: 4px solid #3b82f6;
            padding-left: 16px;
            margin-bottom: 25px;
            line-height: 1.6;
            background: rgba(59, 130, 246, 0.06);
            border-radius: 0 8px 8px 0;
        }
        .drop-zone {
            border: 2.5px dashed #b9c7d9;
            border-radius: 20px;
            padding: 45px 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.25s;
            background: rgba(255, 255, 255, 0.4);
        }
        .drop-zone:hover {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.05);
        }
        .drop-zone.dragover {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.12);
            transform: scale(1.01);
        }
        .drop-zone .icon {
            font-size: 52px;
            display: block;
            margin-bottom: 10px;
        }
        .drop-zone p {
            color: #2c3e50;
            font-size: 17px;
            font-weight: 500;
        }
        .drop-zone .hint {
            color: #6b7b8b;
            font-size: 14px;
            margin-top: 6px;
        }
        #fileInput {
            display: none;
        }

        /* 檔案列表 */
        .file-list {
            margin-top: 20px;
            display: none;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            background: #f8fafc;
        }
        .file-list.show {
            display: block;
        }
        .file-item {
            display: flex;
            align-items: center;
            padding: 12px 18px;
            border-bottom: 1px solid #eef2f6;
            gap: 12px;
            transition: 0.15s;
        }
        .file-item:last-child {
            border-bottom: none;
        }
        .file-item:hover {
            background: #f1f5f9;
        }
        .file-item .status {
            font-size: 20px;
            min-width: 32px;
            text-align: center;
        }
        .file-item .info {
            flex: 1;
            min-width: 0;
        }
        .file-item .name {
            font-weight: 600;
            color: #0f172a;
            word-break: break-all;
            font-size: 14px;
        }
        .file-item .meta {
            font-size: 12px;
            color: #64748b;
            margin-top: 2px;
        }
        .file-item .actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        .file-item .actions .btn-sm {
            padding: 4px 14px;
            border: none;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            background: #e2e8f0;
            color: #1e293b;
        }
        .file-item .actions .btn-sm:hover:not(:disabled) {
            background: #cbd5e1;
        }
        .file-item .actions .btn-sm.success {
            background: #059669;
            color: white;
        }
        .file-item .actions .btn-sm.success:hover {
            background: #047857;
        }
        .file-item .actions .btn-sm:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .file-item .progress-mini {
            width: 80px;
            height: 6px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 4px;
        }
        .file-item .progress-mini .fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #3b82f6, #2563eb);
            border-radius: 10px;
            transition: width 0.3s;
        }

        /* 操作按鈕 */
        .action-bar {
            display: flex;
            gap: 14px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: #1a2634;
            color: white;
            box-shadow: 0 6px 14px rgba(26, 38, 52, 0.25);
        }
        .btn-primary:hover:not(:disabled) {
            background: #2c3e50;
            transform: translateY(-2px);
        }
        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }
        .btn-success {
            background: #059669;
            color: white;
            box-shadow: 0 6px 14px rgba(5, 150, 105, 0.3);
        }
        .btn-success:hover:not(:disabled) {
            background: #047857;
            transform: translateY(-2px);
        }
        .btn-success:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #cbd5e1;
            color: #1e293b;
        }
        .btn-outline:hover {
            background: #f1f5f9;
            border-color: #94a3b8;
        }
        .btn-danger-outline {
            background: transparent;
            border: 2px solid #fca5a5;
            color: #991b1b;
        }
        .btn-danger-outline:hover {
            background: #fef2f2;
            border-color: #ef4444;
        }

        .badge {
            background: #dbeafe;
            color: #1e40af;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
        }
        .footer {
            margin-top: 28px;
            font-size: 13px;
            color: #7a8a9a;
            text-align: center;
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
        }
        .footer span {
            background: #eef2f6;
            padding: 2px 10px;
            border-radius: 30px;
        }
        .summary {
            margin-top: 16px;
            padding: 12px 18px;
            background: #f0f4fe;
            border-radius: 12px;
            display: none;
            font-size: 14px;
            color: #1e293b;
            gap: 20px;
            flex-wrap: wrap;
        }
        .summary.show {
            display: flex;
        }
        @media (max-width: 600px) {
            .container { padding: 20px 16px; }
            h1 { font-size: 22px; }
            .file-item { flex-wrap: wrap; }
            .file-item .actions { width: 100%; justify-content: flex-end; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>
        📚 PDF ➜ TXT <small>批量轉換</small>
    </h1>
    <div class="subtitle">
        ⚡ 一次拖曳多個 PDF · 檔案不上傳 · 支援批次下載
    </div>

    <!-- 上傳區域 -->
    <div class="drop-zone" id="dropZone">
        <span class="icon">📤</span>
        <p>拖曳多個 PDF 檔案至此，或點擊上傳</p>
        <div class="hint">支援批次上傳 ｜ 單檔最大 50MB</div>
        <input type="file" id="fileInput" accept=".pdf" multiple>
    </div>

    <!-- 檔案列表 -->
    <div class="file-list" id="fileList"></div>

    <!-- 摘要資訊 -->
    <div class="summary" id="summary">
        <span>📄 檔案總數：<strong id="totalCount">0</strong></span>
        <span>✅ 已轉換：<strong id="convertedCount">0</strong></span>
        <span>⏳ 等待中：<strong id="pendingCount">0</strong></span>
    </div>

    <!-- 操作按鈕 -->
    <div class="action-bar">
        <button class="btn btn-primary" id="convertAllBtn">🔄 全部轉換</button>
        <button class="btn btn-success" id="downloadAllBtn" disabled>📦 下載全部 (ZIP)</button>
        <button class="btn btn-outline" id="clearAllBtn">🗑️ 清空全部</button>
    </div>

    <div class="footer">
        <span>🔒 所有處理都在瀏覽器完成 · 檔案不會上傳</span>
        <span style="margin-left:12px;">📦 ZIP 壓縮使用 JSZip</span>
    </div>
</div>

<!-- 引入 JSZip 用於打包下載 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<script>
    (function() {
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        // DOM
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileListEl = document.getElementById('fileList');
        const summary = document.getElementById('summary');
        const totalCount = document.getElementById('totalCount');
        const convertedCount = document.getElementById('convertedCount');
        const pendingCount = document.getElementById('pendingCount');
        const convertAllBtn = document.getElementById('convertAllBtn');
        const downloadAllBtn = document.getElementById('downloadAllBtn');
        const clearAllBtn = document.getElementById('clearAllBtn');

        // 檔案陣列
        let files = []; // 每個元素: { id, file, name, size, status, text, progress }

        let idCounter = 0;
        let isConverting = false;

        // ---------- 輔助函數 ----------
        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1048576).toFixed(1) + ' MB';
        }

        function getStatusIcon(status) {
            switch(status) {
                case 'pending': return '⏳';
                case 'converting': return '🔄';
                case 'done': return '✅';
                case 'error': return '❌';
                default: return '📄';
            }
        }

        function updateSummary() {
            const total = files.length;
            const done = files.filter(f => f.status === 'done').length;
            const pending = files.filter(f => f.status === 'pending' || f.status === 'converting').length;
            totalCount.textContent = total;
            convertedCount.textContent = done;
            pendingCount.textContent = pending;
            summary.classList.toggle('show', total > 0);
            downloadAllBtn.disabled = done === 0;
            convertAllBtn.disabled = isConverting || pending === 0 || total === 0;
        }

        function renderFileList() {
            if (files.length === 0) {
                fileListEl.classList.remove('show');
                fileListEl.innerHTML = '';
                updateSummary();
                return;
            }
            fileListEl.classList.add('show');
            let html = '';
            files.forEach((f, index) => {
                const icon = getStatusIcon(f.status);
                const progress = f.progress || 0;
                html += `
                    <div class="file-item" data-index="${index}">
                        <span class="status">${icon}</span>
                        <div class="info">
                            <div class="name">${escapeHtml(f.name)}</div>
                            <div class="meta">${formatSize(f.size)}</div>
                            <div class="progress-mini">
                                <div class="fill" style="width:${progress}%"></div>
                            </div>
                        </div>
                        <div class="actions">
                            ${f.status === 'done' ? `<button class="btn-sm success" onclick="window.downloadSingle(${index})">⬇️ 下載</button>` : ''}
                            ${f.status === 'done' || f.status === 'error' ? `<button class="btn-sm" onclick="window.removeFile(${index})">✕</button>` : ''}
                        </div>
                    </div>
                `;
            });
            fileListEl.innerHTML = html;
            updateSummary();
        }

        // 簡單防 XSS
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // 移除單一檔案
        window.removeFile = function(index) {
            if (isConverting) {
                alert('轉換中，請稍後再移除');
                return;
            }
            files.splice(index, 1);
            renderFileList();
        };

        // 下載單一檔案
        window.downloadSingle = function(index) {
            const f = files[index];
            if (!f || f.status !== 'done' || !f.text) return;
            const blob = new Blob([f.text], { type: 'text/plain;charset=utf-8' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = f.name.replace(/\.pdf$/i, '') + '.txt';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(link.href);
        };

        // ---------- 新增檔案 ----------
        function addFiles(fileList) {
            if (isConverting) {
                alert('轉換中，請稍後再新增檔案');
                return;
            }
            let added = 0;
            for (const file of fileList) {
                if (file.type !== 'application/pdf' && !file.name.toLowerCase().endsWith('.pdf')) {
                    continue;
                }
                if (file.size > 50 * 1024 * 1024) {
                    alert(`「${file.name}」超過 50MB，已跳過`);
                    continue;
                }
                files.push({
                    id: idCounter++,
                    file: file,
                    name: file.name,
                    size: file.size,
                    status: 'pending',
                    text: '',
                    progress: 0,
                });
                added++;
            }
            if (added > 0) {
                renderFileList();
            } else {
                alert('沒有可用的 PDF 檔案');
            }
        }

        // ---------- 轉換單一 PDF ----------
        async function convertOne(fileItem, index) {
            try {
                fileItem.status = 'converting';
                fileItem.progress = 0;
                renderFileList();

                const arrayBuffer = await fileItem.file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                const totalPages = pdf.numPages;
                let fullText = '';

                for (let i = 1; i <= totalPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    const pageText = content.items.map(item => item.str).join(' ');
                    fullText += pageText + '\n\n';
                    const percent = Math.round((i / totalPages) * 100);
                    fileItem.progress = percent;
                    // 每 5 頁更新一次 UI
                    if (i % 5 === 0 || i === totalPages) {
                        renderFileList();
                    }
                }

                fileItem.text = fullText.trim() || '(此 PDF 無文字內容)';
                fileItem.status = 'done';
                fileItem.progress = 100;
                renderFileList();
                return true;
            } catch (err) {
                console.error(`轉換失敗: ${fileItem.name}`, err);
                fileItem.status = 'error';
                fileItem.text = '';
                renderFileList();
                return false;
            }
        }

        // ---------- 全部轉換 ----------
        async function convertAll() {
            if (isConverting) return;
            const pendingItems = files.filter(f => f.status === 'pending');
            if (pendingItems.length === 0) {
                alert('沒有待轉換的檔案');
                return;
            }
            isConverting = true;
            convertAllBtn.disabled = true;

            for (let i = 0; i < files.length; i++) {
                if (files[i].status === 'pending') {
                    await convertOne(files[i], i);
                }
            }

            isConverting = false;
            convertAllBtn.disabled = false;
            renderFileList();
        }

        // ---------- 下載全部 (ZIP) ----------
        async function downloadAllZip() {
            const doneFiles = files.filter(f => f.status === 'done' && f.text);
            if (doneFiles.length === 0) {
                alert('沒有已轉換完成的檔案');
                return;
            }

            try {
                const zip = new JSZip();
                doneFiles.forEach(f => {
                    const baseName = f.name.replace(/\.pdf$/i, '');
                    zip.file(baseName + '.txt', f.text);
                });
                const zipBlob = await zip.generateAsync({ type: 'blob' });
                saveAs(zipBlob, 'pdf轉txt_批次輸出.zip');
            } catch (err) {
                console.error('ZIP 打包失敗:', err);
                alert('打包下載失敗：' + err.message);
            }
        }

        // ---------- 清空全部 ----------
        function clearAll() {
            if (isConverting) {
                alert('轉換中，請稍後再清空');
                return;
            }
            if (files.length === 0) return;
            if (confirm('確定要清空所有檔案嗎？')) {
                files = [];
                renderFileList();
            }
        }

        // ---------- 事件綁定 ----------

        // 點擊上傳
        dropZone.addEventListener('click', () => fileInput.click());

        // 檔案選擇
        fileInput.addEventListener('change', (e) => {
            if (fileInput.files.length > 0) {
                addFiles(fileInput.files);
                fileInput.value = '';
            }
        });

        // 拖曳
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                addFiles(e.dataTransfer.files);
            }
        });

        // 按鈕
        convertAllBtn.addEventListener('click', convertAll);
        downloadAllBtn.addEventListener('click', downloadAllZip);
        clearAllBtn.addEventListener('click', clearAll);

        // 將函數掛到 window 供內聯 onclick 使用
        window.downloadSingle = downloadSingle;
        window.removeFile = removeFile;

        // 初始化
        renderFileList();
    })();
</script>
</body>
</html>
